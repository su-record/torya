name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- bridge: cross-compile 4 platforms via `make release` ------------
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Build bridge binaries
        run: make -C bridge release

      # ---- extension: build dist + zip with manifest at archive root -------
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter torya-extension build

      - name: Package extension
        run: |
          cd extension/dist
          zip -r "$GITHUB_WORKSPACE/torya-extension.zip" .

      # ---- collect assets --------------------------------------------------
      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp bridge/dist/torya-bridge-darwin-amd64  release-assets/
          cp bridge/dist/torya-bridge-darwin-arm64  release-assets/
          cp bridge/dist/torya-bridge-linux-amd64   release-assets/
          cp bridge/dist/torya-bridge-linux-arm64   release-assets/
          cp bridge/dist/torya-bridge-windows-amd64.exe release-assets/
          cp torya-extension.zip                    release-assets/
          ls -lh release-assets/

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes
          fi
